name: clt-chatbot-system
services:
  postgres:
    image: postgres:16
    container_name: clt-postgres
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chatbot-backend:
    image: python:3.11-slim
    container_name: chatbot-backend
    working_dir: /app
    volumes:
      - ../apps/chatbot-backend:/app
      - .:/infra
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --reload --host 0.0.0.0 --port 8083"
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgresql+psycopg://chatbot:chatbot@postgres:5432/chatbot
      CORS_ALLOW_ORIGINS: http://localhost:10000
      ENABLE_DEV_LOGIN: "true"
      JWT_SECRET: change-me
    depends_on:
      - postgres

  chatbot-admin-backend:
    image: python:3.11-slim
    container_name: chatbot-admin-backend
    working_dir: /app
    volumes:
      - ../apps/chatbot-admin-backend:/app
      - .:/infra
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --reload --host 0.0.0.0 --port 8082"
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgresql+psycopg://chatbot:chatbot@postgres:5432/chatbot
      CORS_ALLOW_ORIGINS: http://localhost:10001
    depends_on:
      - postgres

  chatbot-front:
    image: node:20
    container_name: chatbot-front
    working_dir: /app
    volumes:
      - ../apps/chatbot-front:/app
      - chatbot_front_node_modules:/app/node_modules
    environment:
      API_BASE_URL: http://localhost:8083
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      FAST_REFRESH: "true"
    command: >
      sh -c "npm ci &&
             npm run ${NEXT_DEV_CMD:-dev} -- --hostname 0.0.0.0 --port 10000"
    ports:
      - "10000:10000"
    depends_on:
      - chatbot-backend

  chatbot-admin:
    image: node:20
    container_name: chatbot-admin
    working_dir: /app
    volumes:
      - ../apps/chatbot-admin:/app
      - chatbot_admin_node_modules:/app/node_modules
    environment:
      VITE_ADMIN_BACKEND_URL: http://localhost:8082
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      FAST_REFRESH: "true"
    command: >
      sh -c "npm ci && npm run dev -- --host --port 10001"
    ports:
      - "10001:10001"
    depends_on:
      - chatbot-admin-backend

volumes:
  postgres_data:
  chatbot_front_node_modules:
  chatbot_admin_node_modules:
